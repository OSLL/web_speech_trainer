{% extends "base.html" %}
{% block header %}
<link rel="stylesheet" href="/static/css/interview.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
{% endblock %}
{% block content %}
<div class="interview-container" data-session-timer-minutes="{{ interview_session_minutes|default(3) }}">
  <div class="top-center text-center">
    <div class="headphones-hint">
      Рекомендуется отвечать на вопросы в наушниках
    </div>

    <div class="timer-section is-hidden">
      <div class="question-card">
        <div class="question-card-top">
          <div class="timer-badge">
            <div class="info-label">Осталось времени</div>
            <h3 id="timer">00:00</h3>
          </div>

          <div class="question-progress">
            <div class="info-label">Текущий вопрос</div>
            <h3>
              <span id="question-number">1</span>
              <span class="question-progress-divider">из</span>
              <span id="question-total"></span>
            </h3>
          </div>
        </div>

        <div id="question-placeholder" class="question-placeholder">
          Вопросы появятся здесь после старта интервью
        </div>
        <p id="question-text" class="mt-3"></p>
      </div>
    </div>

    <div id="status" class="mt-3 status-text"></div>

    <div id="feedback-panel" class="mt-3 p-3 border rounded text-start" style="display:none; max-width: 760px; margin: 0 auto;">
      <div><strong>Итоговый балл:</strong> <span id="feedback-score"></span></div>
      <div id="feedback-verdict" class="mt-2"></div>
      <div id="feedback-criteria" class="mt-2"></div>
    </div>

    <div class="controls-center">
      <div class="btn-row">
        <button id="main-btn" class="interview-btn interview-btn-main">Начать</button>
        <button id="end-answer-btn" class="interview-btn interview-btn-end" style="display:none;">Закончить ответ</button>
        <button id="next-btn" class="interview-btn interview-btn-next" style="display:none;">Следующий вопрос</button>
      </div>

      <div class="mic-circle-wrapper" id="mic-indicator" style="opacity:0.35;">
        <i class="bi bi-mic-fill"></i>
      </div>
    </div>
  </div>

  <button id="stop-btn" class="btn btn-danger stop-btn">Прервать сессию</button>

  <script src="{{ url_for('static', filename='js/interview.js') }}"></script>
</div>
{% endblock %}
