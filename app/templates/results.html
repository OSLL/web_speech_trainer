{% extends "base.html" %}

{% block header %}
<link rel="stylesheet" href="/static/css/results.css">
{% endblock %}

{% block content %}
<div class="results-container">
  <div class="results-card">

    <h1 class="results-title">Результаты интервью</h1>

    <div class="total-score-block">
      <div class="total-score-label">Общий балл</div>
      <div class="total-score-value" id="total-score"></div>
      <div class="results-verdict" id="results-verdict">{{ verdict }}</div>
    </div>

    <div class="questions-legend" id="questions-legend"></div>

    <div class="table-wrapper">
      <table class="results-table">
        <thead id="results-head"></thead>
        <tbody id="results-body"></tbody>
        <tfoot id="results-foot"></tfoot>
      </table>
    </div>

    <div class="results-actions">
      <a id="restart-btn" class="results-btn results-btn-primary" href="{{ restart_url }}"> Пройти заново </a>
    </div>

  </div>
</div>

<script>
  window.RESULTS_DATA = {
    totalScore: {{ total_score | tojson }},
    maxScore: {{ max_score | tojson }},
    verdict: {{ verdict | tojson }},
    questions: {{ questions | tojson }},
    results: {{ results | tojson }},
    questionTotals: {{ question_totals | tojson }}
  };
</script>

<script src="{{ url_for('static', filename='js/results.js') }}"></script>
{% endblock %}
