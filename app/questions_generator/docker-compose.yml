services:
  init:
    build: .
    entrypoint: ["/usr/local/bin/init-volumes.sh"]
    volumes:
      - rut5_model:/app/question_generator/rut5-base
      - nltk_data:/nltk_data
    restart: "no"

  app:
    build: .
    depends_on:
      init:
        condition: service_completed_successfully
    stdin_open: true
    tty: true
    volumes:
      - rut5_model:/app/question_generator/rut5-base
      - nltk_data:/nltk_data
      - ./vkr_examples:/app/vkr_examples
    command: ["bash", "-lc", "sleep infinity"]

volumes:
  rut5_model:
  nltk_data:
