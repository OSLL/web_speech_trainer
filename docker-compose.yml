version: '2'

services:
  web:
    image: wst-image:v0.2
    build: .
    command: bash -c "python3 ./db_versioning/db_versioning.py --mongo mongodb://db:27017 && python3 -m web_speech_trainer $APP_CONF" 
    environment:
    - APP_CONF=${APP_CONF}
    restart: always
    ports:
      - 5000:5000
    depends_on:
      - db
      - rabbitmq
      - nltk_downloader
    volumes:
      - ../database-dump:/app/dump/database-dump/

  db:
    image: "mongo:8-noble"
    restart: always
    command:
      - '--wiredTigerCacheSizeGB=2'
    volumes:
      - ../mongo_data:/data/db

  whisper:
    image: "onerahmet/openai-whisper-asr-webservice:v1.3.0"
    environment:
      - ASR_MODEL=${WHISPER_ASR_MODEL:-tiny}
      - ASR_ENGINE=${WHISPER_ASR_ENGINE:-openai_whisper}
    restart: always
    cpuset: ${WHISPER_CPU:-0,1}
    mem_limit: ${WHISPER_MEM_LIMIT:-5g}
    volumes:
      - whisper_models:/root/.cache/whisper
  
  nltk_downloader:
    image: wst-image:v0.2
    command: python3 download_nltk.py
    volumes:
      - nltk_data:/root/nltk_data
    restart: no

  rabbitmq:
    image: rabbitmq:4-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
  
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  
  flower:
    image: wst-image:v0.2
    command: celery -A app.celery_app flower --port=5555 --basic_auth=guest:guest --broker_api=http://guest:guest@rabbitmq:15672/api/
    ports:
      - "5555:5555"
    environment:
      - APP_CONF=${APP_CONF}
    depends_on:
      - db
      - rabbitmq
      - redis
      - celery_worker_audio_rec
      - celery_worker_audio_proc
      - celery_worker_pres_rec
      - celery_worker_pres_proc
      - celery_worker_training
      - celery_worker_passback
      - celery_worker_default
    restart: always

  celery_worker_audio_rec:
    image: wst-image:v0.2
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q audio_recognition
    environment:
    - APP_CONF=${APP_CONF}
    depends_on:
      - db
      - rabbitmq
      - redis
      - whisper

  celery_worker_audio_proc:
    image: wst-image:v0.2
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q audio_processing
    environment:
      - APP_CONF=${APP_CONF}
    depends_on:
      - db
      - rabbitmq
      - redis
      
  celery_worker_pres_rec:
    image: wst-image:v0.2
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q presentation_recognition
    environment:
      - APP_CONF=${APP_CONF}
    depends_on:
      - db
      - rabbitmq
      - redis
      - nltk_downloader
    volumes:
      - nltk_data:/root/nltk_data

  celery_worker_pres_proc:
    image: wst-image:v0.2
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q presentation_processing
    environment:
      - APP_CONF=${APP_CONF}
    depends_on:
      - db
      - rabbitmq
      - redis
  
  celery_worker_training:
    image: wst-image:v0.2
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q training
    environment:
      - APP_CONF=${APP_CONF}
    depends_on:
      - db
      - rabbitmq
      - redis
      - nltk_downloader
    volumes:
      - nltk_data:/root/nltk_data

  celery_worker_passback:
    image: wst-image:v0.2
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q passback
    environment:
      - APP_CONF=${APP_CONF}
    depends_on:
      - db
      - rabbitmq
      - redis

  celery_worker_default:
    image: wst-image:v0.2
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q default
    environment:
      - APP_CONF=${APP_CONF}
    depends_on:
      - db
      - rabbitmq
      - redis


volumes:
  whisper_models:
  redis_data:
  nltk_data: 